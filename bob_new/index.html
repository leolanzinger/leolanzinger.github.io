<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<title>Bob and the Apple</title>

		<!-- Custom LinkU stylesheet -->
		<link href="assets/css/style.css" rel="stylesheet">

		<!-- foundation webicons -->
		<link rel="stylesheet" href="webicons.css">

		<!--Fonts from Google Fonts-->
		<link href='http://fonts.googleapis.com/css?family=Raleway:500,300,700' rel='stylesheet' type='text/css'>
		<link href='https://fonts.googleapis.com/css?family=Poiret+One' rel='stylesheet' type='text/css'>
		<link href='http://fonts.googleapis.com/css?family=Roboto:700,400,200' rel='stylesheet' type='text/css'>

		<!-- Favicon -->
		<link rel="apple-touch-icon" sizes="57x57" href="assets/favicon/apple-icon-57x57.png">
		<link rel="apple-touch-icon" sizes="60x60" href="assets/favicon/apple-icon-60x60.png">
		<link rel="apple-touch-icon" sizes="72x72" href="assets/favicon/apple-icon-72x72.png">
		<link rel="apple-touch-icon" sizes="76x76" href="assets/favicon/apple-icon-76x76.png">
		<link rel="apple-touch-icon" sizes="114x114" href="assets/favicon/apple-icon-114x114.png">
		<link rel="apple-touch-icon" sizes="120x120" href="assets/favicon/apple-icon-120x120.png">
		<link rel="apple-touch-icon" sizes="144x144" href="assets/favicon/apple-icon-144x144.png">
		<link rel="apple-touch-icon" sizes="152x152" href="assets/favicon/apple-icon-152x152.png">
		<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-icon-180x180.png">
		<link rel="icon" type="image/png" sizes="192x192"  href="assets/favicon/android-icon-192x192.png">
		<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="96x96" href="assets/favicon/favicon-96x96.png">
		<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
		<link rel="manifest" href="assets/favicon/manifest.json">
		<meta name="msapplication-TileColor" content="#ffffff">
		<meta name="msapplication-TileImage" content="assets/favicon/ms-icon-144x144.png">
		<meta name="theme-color" content="#ffffff">

	</head>

	<body>

		<header>
		</header>
		
		<div id="wrapper" class="clearfix">
			<div class="row clearfix">
				<div class="column full-width clearfix">
					<div class="box transparent logo-wrapper">
						<img src="assets/img/logo_bob_black.svg" />
						<div class="social-icons-container">
							<a class="webicon facebook" href="http://www.facebook.com/bobandtheapple">Facebook</a>
							<a class="webicon soundcloud" href="https://soundcloud.com/bobandtheapple">Soundcloud</a>
							<a class="webicon youtube" href="https://www.youtube.com/channel/UCXAT42GomAQvaw3w1nAvaGg">Youtube</a>
							<!--<a class="webicon instagram" href="#">Instagram</a>-->
							<a class="webicon mail" href="mailto:bobandtheapple@gmail.com">Mail</a>
						</div>
					</div>
				</div>
			</div>
			<div class="row clearfix">
				<div class="column half-width">
					<div id="music" class="box shadow">
						<div class="title">
							MUSIC
						</div>
						<div class="player">
							<iframe id="scframe" width="100%" height="450px" scrolling="no" frameborder="no" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/263238956%3Fsecret_token%3Ds-xekYG&amp;color=ff5500&amp;auto_play=false&amp;hide_related=false&amp;show_comments=true&amp;show_user=true&amp;show_reposts=false"></iframe>
						</div>
					</div>
				</div>
				<div class="column half-width clearfix">
					<div id="instagram" class="box shadow">
						<div class="title">
							INSTAGRAM
						</div>
						<div class="player">
							<!-- LightWidget WIDGET --><script src="//lightwidget.com/widgets/lightwidget.js"></script><iframe src="//lightwidget.com/widgets/e6b58f145a67537ab465bd042ff8626f.html" id="lightwidget_e6b58f145a" name="lightwidget_e6b58f145a"  scrolling="no" allowtransparency="true" class="lightwidget-widget" style="width: 100%; border: 0; "></iframe>

						</div>
					</div>
				</div>
			</div>
			<div class="row clearfix">
				<!-- video -->
				<div class="column full-width">
					<div id="video" class="box shadow">
						<div class="title">
							VIDEO
						</div>
						<div id="ytwrapper">
							<div class="ytplayer">
								<iframe id="ytframe" src="https://www.youtube.com/embed/videoseries?list=PLvaOg0MLVgFV8pC1w0iXbd4dlAml-Bv6i" frameborder="0" allowfullscreen></iframe>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<footer>

			<div class="footer-logo">
				<img src="assets/img/logo_bob_black.svg" />
			</div>

			<div class="social-icons-container">
				<a class="webicon facebook small" href="http://www.facebook.com/bobandtheapple">Facebook</a>
				<a class="webicon soundcloud small" href="https://soundcloud.com/bobandtheapple">Soundcloud</a>
				<a class="webicon youtube small" href="https://www.youtube.com/channel/UCXAT42GomAQvaw3w1nAvaGg">Youtube</a>
				<!--<a class="webicon instagram" href="#">Instagram</a>-->
				<a class="webicon mail small" href="mailto:bobandtheapple@gmail.com">Mail</a>
			</div>
		</footer>

		<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
		<script>
			$(document).ready(function() {
				$('#instagram').height($('#music').height());
				$('#instagram iframe').height($("#instagram").height() - $('#instagram .title').height() - 40);
			});
		</script>
